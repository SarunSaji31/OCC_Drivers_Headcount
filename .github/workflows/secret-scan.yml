name: secret-scan

# Server-side net: scans every push and PR for committed secrets, even if a
# contributor bypassed the local pre-commit hook. Fails the build on a hit.
on:
  push:
  pull_request:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so the scan covers all commits in the push
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
