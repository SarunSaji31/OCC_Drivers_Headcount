{% extends "duty/base_generic.html" %}

{% block title %}Password Reset - OCC-EKG Project{% endblock %}

{% block content %}
<div class="container mx-auto mt-10 px-6 py-8 bg-white rounded-lg shadow-lg max-w-md">
    <h3 class="text-center text-2xl font-semibold text-gray-800 mb-4">Password Reset</h3>

    <p class="text-center text-lg text-gray-600 mb-6">Enter your Staff ID and email address below to verify your identity and reset your password.</p>

    <form method="post">
        {% csrf_token %}
        <div class="mb-4">
            <label for="id_staff_id" class="block text-lg font-medium text-gray-700">Staff ID</label>
            <div class="flex items-center border-b border-gray-300">
                <span class="text-gray-500 pr-3"><i class="bi bi-person-badge"></i></span>
                <input type="text" id="id_staff_id" name="staff_id" class="form-control w-full p-2 border-0 focus:outline-none focus:ring-2 focus:ring-indigo-500 rounded-lg" placeholder="Enter your Staff ID" required>
            </div>
        </div>
        <div class="mb-4">
            <label for="id_email" class="block text-lg font-medium text-gray-700">Email Address</label>
            <div class="flex items-center border-b border-gray-300">
                <span class="text-gray-500 pr-3"><i class="bi bi-envelope"></i></span>
                <input type="email" id="id_email" name="email" class="form-control w-full p-2 border-0 focus:outline-none focus:ring-2 focus:ring-indigo-500 rounded-lg" placeholder="Enter your email" required>
            </div>
        </div>

        <button type="submit" class="btn btn-primary w-full py-3 bg-indigo-600 text-white font-semibold rounded-lg hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500">Verify and Reset</button>
    </form>

    <p class="text-center mt-4 text-gray-600"><a href="{% url 'login' %}" class="text-indigo-600 hover:text-indigo-700">Back to Login</a></p>
</div>
{% endblock %}
