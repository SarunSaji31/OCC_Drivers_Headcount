{% extends "duty/base_generic.html" %}

{% block title %}Password Reset · OCC-EKG Staff Transport{% endblock %}

{% block content %}
<div class="auth-wrap">
    <div class="auth-card content-surface">
        <div class="auth-icon"><i class="bi bi-question-circle"></i></div>
        <h3 class="auth-title">Reset your password</h3>
        <p class="auth-subtitle">Verify your identity with your Staff ID and email</p>

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="id_staff_id" class="form-label">Staff ID</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person-badge"></i></span>
                    <input type="text" id="id_staff_id" name="staff_id" class="form-control" placeholder="Enter your Staff ID" required autofocus>
                </div>
            </div>
            <div class="mb-3">
                <label for="id_email" class="form-label">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" id="id_email" name="email" class="form-control" placeholder="Enter your email" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-shield-check me-1"></i> Verify &amp; continue
            </button>
        </form>

        <p class="text-center mt-4 mb-0 text-muted" style="font-size:.92rem;">
            <a href="{% url 'login' %}"><i class="bi bi-arrow-left me-1"></i>Back to login</a>
        </p>
    </div>
</div>
{% endblock %}
