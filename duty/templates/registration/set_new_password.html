{% extends "duty/base_generic.html" %}

{% block title %}Set New Password{% endblock %}

{% block content %}
<div class="container mx-auto mt-10 px-6 py-8 bg-white rounded-lg shadow-lg max-w-md">
    <h3 class="text-center text-2xl font-semibold text-gray-800 mb-6">Set a New Password</h3>

    <form method="post">
        {% csrf_token %}
        <div class="mb-4">
            <label for="id_new_password" class="block text-lg font-medium text-gray-700">New Password</label>
            <input type="password" id="id_new_password" name="new_password" class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Enter your new password" required>
        </div>
        
        <div class="mb-4">
            <label for="id_confirm_password" class="block text-lg font-medium text-gray-700">Confirm Password</label>
            <input type="password" id="id_confirm_password" name="confirm_password" class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Confirm your password" required>
        </div>

        <button type="submit" class="w-full py-3 bg-indigo-600 text-white font-semibold rounded-lg hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500">Reset Password</button>
    </form>
</div>
{% endblock %}
