{% extends "duty/base_generic.html" %}

{% block title %}Success · OCC-EKG{% endblock %}

{% block nav_links %}
    <a href="{% url 'home' %}"><i class="bi bi-house-door"></i> Home</a>
    <a href="{% url 'enter_head_count' %}"><i class="bi bi-clipboard-check"></i> Enter Details</a>
    <a href="{% url 'submission_history' %}"><i class="bi bi-clock-history"></i> History</a>
{% endblock %}

{% block content %}
<div style="max-width: 700px; margin: 0 auto;">
    <div class="content-surface text-center">
        <div class="auth-icon" style="background:#f0fdf4;color:var(--color-success);width:72px;height:72px;font-size:2.25rem;">
            <i class="bi bi-check-circle-fill"></i>
        </div>
        <h3 class="mb-2">Success!</h3>
        <p class="text-muted mb-4">{{ success_message }}</p>
        <div class="d-grid gap-2 col-md-8 mx-auto">
            <a href="{% url 'home' %}" class="btn btn-primary"><i class="bi bi-house-door me-1"></i>Go Back to Home</a>
            <a href="{% url 'enter_head_count' %}" class="btn btn-outline-primary"><i class="bi bi-plus-lg me-1"></i>Enter More Data</a>
            <a href="{% url 'submission_history' %}" class="btn btn-outline-secondary"><i class="bi bi-clock-history me-1"></i>Check Submission History</a>
        </div>
    </div>
</div>
{% endblock %}
