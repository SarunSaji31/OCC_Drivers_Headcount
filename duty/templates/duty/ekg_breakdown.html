{% extends "duty/base_generic.html" %}

{% block title %}Breakdown Report · OCC-EKG{% endblock %}

{% block nav_links %}
    <a href="{% url 'home' %}"><i class="bi bi-house-door"></i> Home</a>
    <a href="{% url 'subcategory_selection' %}"><i class="bi bi-grid"></i> STM-EKG</a>
    <a href="{% url 'logout' %}"><i class="bi bi-box-arrow-right"></i> Logout</a>
{% endblock %}

{% block content %}
<div style="max-width: 860px; margin: 0 auto;">
    <a href="{% url 'subcategory_selection' %}" class="btn btn-outline-secondary mb-3"><i class="bi bi-arrow-left me-1"></i>Back to STM-EKG</a>

    <div class="content-surface">
        <div class="page-header text-center"><h2>Breakdown Report Form</h2></div>

        <form id="BreakdownReportForm" method="post" action="{% url 'ekg_breakdown' %}">
            {% csrf_token %}
            <div class="row mb-3"><label class="form-label col-md-4">Date and Time of Report</label><div class="col-md-8"><input type="datetime-local" class="form-control" name="reported_datetime" required></div></div>
            <div class="row mb-3"><label class="form-label col-md-4">Breakdown Date and Time</label><div class="col-md-8"><input type="datetime-local" class="form-control" name="breakdown_datetime" required></div></div>
            <div class="row mb-3"><label class="form-label col-md-4">Breakdown Location</label><div class="col-md-8"><input type="text" class="form-control" name="location" placeholder="Enter location" required></div></div>
            <div class="row mb-3"><label class="form-label col-md-4">Route #</label><div class="col-md-8"><input type="text" class="form-control" name="route_number" placeholder="Enter Route #" required></div></div>
            <div class="row mb-3"><label class="form-label col-md-4">Trip Work Order #</label><div class="col-md-8"><input type="text" class="form-control" name="trip_work_order" placeholder="Enter Work Order #" required></div></div>
            <div class="row mb-3"><label class="form-label col-md-4">No. of passengers involved</label><div class="col-md-8"><input type="number" class="form-control" name="passengers_involved" required></div></div>
            <div class="row mb-3"><label class="form-label col-md-4">Non-EK Passenger Details</label><div class="col-md-8"><textarea class="form-control" name="non_ek_passenger_details" placeholder="Enter details"></textarea></div></div>
            <div class="row mb-3"><label class="form-label col-md-4">No. of injured passengers</label><div class="col-md-8"><input type="number" class="form-control" name="injured_passengers" required></div></div>
            <div class="row mb-3"><label class="form-label col-md-4">Action taken for injured passenger</label><div class="col-md-8"><textarea class="form-control" name="action_taken_for_injured" placeholder="Describe action taken"></textarea></div></div>
            <div class="row mb-3"><label class="form-label col-md-4">Damage to the vehicle(s)</label><div class="col-md-8"><select class="form-select" name="vehicle_damage" required><option value="yes">Yes</option><option value="no">No</option></select></div></div>
            <div class="row mb-3"><label class="form-label col-md-4">Driver Name</label><div class="col-md-8"><input type="text" class="form-control" name="driver_name" placeholder="Enter Driver Name" required></div></div>
            <div class="row mb-3"><label class="form-label col-md-4">Driver ID</label><div class="col-md-8"><input type="text" class="form-control" name="driver_id" placeholder="Enter Driver ID" required></div></div>
            <div class="row mb-3"><label class="form-label col-md-4">Driver Shift</label><div class="col-md-8"><input type="text" class="form-control" name="driver_shift" placeholder="Enter Driver Shift" required></div></div>
            <div class="row mb-3"><label class="form-label col-md-4">Description of the Breakdown</label><div class="col-md-8"><textarea class="form-control" name="breakdown_description" placeholder="Describe the breakdown" required></textarea></div></div>
            <div class="row mb-3"><label class="form-label col-md-4">No. of EK vehicles involved</label><div class="col-md-8"><input type="number" class="form-control" name="ek_vehicles_involved" required></div></div>
            <div class="row mb-3"><label class="form-label col-md-4">Vehicle Make and Plate #</label><div class="col-md-8"><input type="text" class="form-control" name="vehicle_make_plate" placeholder="Enter Vehicle Make and Plate #" required></div></div>
            <div class="row mb-3"><label class="form-label col-md-4">Replacement vehicle #</label><div class="col-md-8"><input type="text" class="form-control" name="replacement_vehicle" placeholder="Enter Replacement Vehicle #"></div></div>
            <div class="row mb-3"><label class="form-label col-md-4">Reported to person at EK</label><div class="col-md-8"><input type="text" class="form-control" name="reported_to_person" placeholder="Enter name of EK contact"></div></div>

            <button type="submit" class="btn btn-primary w-100"><i class="bi bi-send me-1"></i>Submit Report</button>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const form = document.querySelector('#BreakdownReportForm');
        form.addEventListener('submit', function (event) {
            event.preventDefault();
            const formData = new FormData(form);
            fetch("{% url 'ekg_breakdown' %}", {
                method: 'POST',
                body: formData,
                headers: { 'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value }
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    window.location.href = "/success/";
                } else {
                    alert('An error occurred: ' + (data.message || 'Unknown error'));
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('An unexpected error occurred.');
            });
        });
    });
</script>
{% endblock %}
