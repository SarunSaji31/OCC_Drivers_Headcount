<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Upload Daily Reports</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Subtle light gradient background for the entire page */
    body {
      background: linear-gradient(to bottom right, #f9fafb, #e5e7eb);
    }
    /* Toast container fixed to top-right */
    #toast-container {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 9999;
    }
  </style>
</head>
<body class="antialiased">
  <!-- Top Navigation Bar -->
  <nav class="bg-white shadow">
    <div class="max-w-5xl mx-auto px-4 py-3 flex justify-between items-center">
      <div class="flex space-x-4">
        <a href="/" class="text-blue-600 hover:text-blue-800 font-bold text-lg">← Home</a>
        <a href="{% url 'subcategory_selection' %}" class="text-blue-600 hover:text-blue-800 font-bold text-lg">← Sub Category</a>
      </div>
      <!-- Dashboard Button -->
      <a href="{% url 'ekstm_47seater_report_dashboard' %}" 
         class="bg-gradient-to-r from-green-500 to-blue-500 text-white px-4 py-2 rounded-md font-bold hover:from-green-600 hover:to-blue-600 shadow">
         Dashboard
      </a>
    </div>
  </nav>

  <!-- Hero Header -->
  <header class="bg-gradient-to-r from-blue-200 to-purple-200 text-gray-800 py-8 shadow rounded-b-lg">
    <div class="max-w-5xl mx-auto px-4 text-center">
      <h1 class="text-4xl md:text-5xl font-extrabold">Daily Reports Upload Portal</h1>
      <p class="mt-4 text-xl">Easily upload your GPS, Salik, and Mileage reports without leaving this page.</p>
    </div>
  </header>

  <!-- Toast Container -->
  <div id="toast-container"></div>

  <!-- Main Content -->
  <div class="max-w-5xl mx-auto p-8">
    <div class="bg-white rounded-lg shadow-lg p-8">
      <!-- Tabs Navigation -->
      <div class="mb-8 border-b border-gray-300">
        <nav class="-mb-px flex space-x-6" id="tabs">
          <button type="button" class="tab-button py-3 px-4 text-gray-700 border-b-4 font-semibold border-transparent hover:text-blue-700 focus:outline-none" data-tab="gps">GPS Report</button>
          <button type="button" class="tab-button py-3 px-4 text-gray-700 border-b-4 font-semibold border-transparent hover:text-green-700 focus:outline-none" data-tab="salik">Salik Report</button>
          <button type="button" class="tab-button py-3 px-4 text-gray-700 border-b-4 font-semibold border-transparent hover:text-purple-700 focus:outline-none" data-tab="mileage">Mileage Report</button>
        </nav>
      </div>

      <!-- Tab Content -->
      <div id="tab-content">
        <!-- GPS Report Form -->
        <div class="tab-panel" id="gps-panel">
          <form class="ajax-upload space-y-6" data-url="{% url 'upload_gpsreports' %}">
            {% csrf_token %}
            <h2 class="text-2xl font-bold text-gray-800">GPS Report Upload</h2>
            <div>
              <label for="csv_file_routeschedule" class="block text-lg font-medium text-gray-700">Select CSV File</label>
              <input type="file" name="csv_file" id="csv_file_routeschedule" accept=".csv"
                     class="mt-2 block w-full text-base text-gray-600 file:mr-3 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-base file:font-medium file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
            </div>
            <button type="submit"
                    class="w-full py-3 px-6 bg-blue-600 text-white font-bold rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
              Upload GPS Report
            </button>
          </form>
        </div>

        <!-- Salik Report Form -->
        <div class="tab-panel hidden" id="salik-panel">
          <form class="ajax-upload space-y-6" data-url="{% url 'upload_salik' %}">
            {% csrf_token %}
            <h2 class="text-2xl font-bold text-gray-800">Salik Report Upload</h2>
            <div>
              <label for="csv_file_salik" class="block text-lg font-medium text-gray-700">Select CSV File</label>
              <input type="file" name="csv_file" id="csv_file_salik" accept=".csv"
                     class="mt-2 block w-full text-base text-gray-600 file:mr-3 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-base file:font-medium file:bg-green-50 file:text-green-700 hover:file:bg-green-100">
            </div>
            <button type="submit"
                    class="w-full py-3 px-6 bg-green-600 text-white font-bold rounded-md hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-green-500">
              Upload Salik Report
            </button>
          </form>
        </div>

        <!-- Mileage Report Form -->
        <div class="tab-panel hidden" id="mileage-panel">
          <form class="ajax-upload space-y-6" data-url="{% url 'upload_mileage' %}">
            {% csrf_token %}
            <h2 class="text-2xl font-bold text-gray-800">Mileage Report Upload</h2>
            <div>
              <label for="csv_file_mileage" class="block text-lg font-medium text-gray-700">Select CSV File</label>
              <input type="file" name="csv_file" id="csv_file_mileage" accept=".csv"
                     class="mt-2 block w-full text-base text-gray-600 file:mr-3 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-base file:font-medium file:bg-purple-50 file:text-purple-700 hover:file:bg-purple-100">
            </div>
            <button type="submit"
                    class="w-full py-3 px-6 bg-purple-600 text-white font-bold rounded-md hover:bg-purple-700 focus:outline-none focus:ring-2 focus:ring-purple-500">
              Upload Mileage Report
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- JavaScript for Tabs and AJAX Submission -->
  <script>
    // Tab functionality
    document.querySelectorAll('.tab-button').forEach(button => {
      button.addEventListener('click', () => {
        // Remove active classes from all tab buttons and hide panels
        document.querySelectorAll('.tab-button').forEach(btn => {
          btn.classList.remove('border-blue-600', 'border-green-600', 'border-purple-600');
          btn.classList.add('border-transparent');
        });
        document.querySelectorAll('.tab-panel').forEach(panel => {
          panel.classList.add('hidden');
        });
        // Activate the clicked tab
        button.classList.remove('border-transparent');
        const tabName = button.getAttribute('data-tab');
        if (tabName === 'gps') {
          button.classList.add('border-blue-600');
        } else if (tabName === 'salik') {
          button.classList.add('border-green-600');
        } else if (tabName === 'mileage') {
          button.classList.add('border-purple-600');
        }
        document.getElementById(tabName + '-panel').classList.remove('hidden');
      });
    });
    // Activate the first tab by default
    document.querySelector('.tab-button').click();

    // AJAX form submission with toast notifications
    async function ajaxSubmit(form) {
      const url = form.getAttribute('data-url');
      const formData = new FormData(form);
      try {
        const response = await fetch(url, {
          method: 'POST',
          body: formData,
        });
        const text = await response.text();
        if (response.ok) {
          showToast(text, 'success');
          form.reset();
        } else {
          showToast(text, 'error');
        }
      } catch (error) {
        console.error(error);
        showToast('An error occurred during upload.', 'error');
      }
    }

    // Toast notification function
    function showToast(message, type = 'success') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `mb-4 px-4 py-2 rounded shadow text-white ${
        type === 'success' ? 'bg-green-500' : 'bg-red-500'
      } transition-opacity duration-300 opacity-100`;
      toast.innerText = message;
      container.appendChild(toast);
      // Fade out and remove after 3 seconds
      setTimeout(() => {
        toast.classList.add('opacity-0');
        setTimeout(() => {
          toast.remove();
        }, 300);
      }, 3000);
    }

    // Attach AJAX submit handler to each form
    document.querySelectorAll('.ajax-upload').forEach(form => {
      form.addEventListener('submit', function(e) {
        e.preventDefault();
        ajaxSubmit(form);
      });
    });
  </script>
</body>
</html>
