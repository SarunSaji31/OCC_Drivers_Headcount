<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Dashboard</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2rem;
        }
        .btn-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .button {
            background-color: #007bff;
            color: #fff;
            border: none;
            padding: 15px 25px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 5px;
            text-align: center;
            text-decoration: none;
            width: 250px;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }
        .button:hover {
            background-color: #0056b3;
            transform: scale(1.05);
        }
        .button:active {
            background-color: #003f7f;
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <h1>Driver Dashboard</h1>
    <div class="btn-container">
        <!-- Button for Enter Headcount -->
        <a href="{% url 'enter_head_count' %}" class="button">Enter Headcount</a>

        <!-- Button for Shift Duty -->
        <a href="{% url 'shift_duty' %}" class="button">Shift Duty</a>
    </div>
</body>
</html>
