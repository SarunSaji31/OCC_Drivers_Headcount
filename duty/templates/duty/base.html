<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Emirates Transport Hub{% endblock %}</title>

    <!-- Bootstrap CSS (for User_Interface_stmtimetable.html) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- DataTables CSS -->
    <link href="https://cdn.datatables.net/1.11.5/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <!-- Tailwind CSS (for dashboard compatibility) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Orbitron & Roboto (from dashboard) -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Roboto', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #f1f5f9 0%, #dbeafe 100%);
            color: #1e293b;
        }
        .glow {
            animation: glow 2s infinite alternate;
        }
        @keyframes glow {
            0% { text-shadow: 0 0 5px rgba(0, 0, 0, 0.2); }
            100% { text-shadow: 0 0 15px rgba(0, 0, 0, 0.4); }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Header (Inspired by Dashboard) -->
    <header class="bg-gradient-to-r from-indigo-600 to-blue-500 py-6 px-6 md:px-12 text-center relative">
        <div class="absolute top-6 right-6 flex items-center space-x-4">
            <a href="/" class="text-white hover:text-indigo-200 transition">Home</a>
            <a href="/logout/" class="text-red-300 hover:text-red-200 transition">Logout</a>
        </div>
        <h1 class="text-3xl md:text-5xl font-bold text-white mb-2 glow" style="font-family: 'Orbitron', sans-serif;">
            EK-STM Staff Transport Project
        </h1>
        <p class="text-md md:text-lg text-gray-200">Manage your transport operations seamlessly.</p>
    </header>

    <!-- Main Content -->
    <main class="px-6 md:px-12 py-8 max-w-7xl mx-auto">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer (Inspired by Dashboard) -->
    <footer class="py-6 text-center text-gray-500">
        <p>© 2025 Emirates General Transport. <a href="#" class="text-indigo-600 hover:text-indigo-500 transition">Privacy Policy</a></p>
    </footer>

    <!-- Scripts for User_Interface_stmtimetable.html -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.datatables.net/1.11.5/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.11.5/js/dataTables.bootstrap5.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
