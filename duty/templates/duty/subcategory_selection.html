<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Subcategory</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f7f9fc;
            margin: 0;
            padding: 0;
        }

        .container {
            background-color: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
            max-width: 800px;
            margin: 60px auto;
            text-align: center;
        }

        .logout-link {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 16px;
            font-weight: 500;
            color: #dc3545;
            text-decoration: none;
        }

        .logout-link:hover {
            color: #b52a33;
            text-decoration: underline;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            color: #333;
            margin-bottom: 20px;
        }

        p.lead {
            color: #666;
            font-size: 18px;
            margin-bottom: 30px;
        }

        .btn-custom {
            padding: 12px 30px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .btn-primary-custom {
            background-color: #007bff;
            border: none;
            color: #fff;
            box-shadow: 0 5px 10px rgba(0, 123, 255, 0.2);
        }

        .btn-primary-custom:hover {
            background-color: #0056b3;
            box-shadow: 0 8px 15px rgba(0, 123, 255, 0.3);
        }

        .btn-secondary-custom {
            background-color: #6c757d;
            border: none;
            color: #fff;
            box-shadow: 0 5px 10px rgba(108, 117, 125, 0.2);
        }

        .btn-secondary-custom:hover {
            background-color: #565e64;
            box-shadow: 0 8px 15px rgba(108, 117, 125, 0.3);
        }

        .btn-home {
            margin-top: 30px;
            background-color: #28a745;
            border: none;
            color: #fff;
            box-shadow: 0 5px 10px rgba(40, 167, 69, 0.2);
        }

        .btn-home:hover {
            background-color: #218838;
            box-shadow: 0 8px 15px rgba(40, 167, 69, 0.3);
        }

        .footer {
            text-align: center;
            font-size: 16px;
            margin-top: 40px;
            color: #888;
        }

        .footer a {
            color: #007bff;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        /* Fade-in animation */
        .container {
            animation: fadeIn 0.8s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 30px;
            }

            h1 {
                font-size: 26px;
            }

            .btn-custom {
                padding: 10px 20px;
                font-size: 14px;
            }

            p.lead {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

<!-- Logout link -->
<a href="/logout/" class="logout-link">Logout</a>

<div class="container">
    <h1 class="mb-4">Select Subcategory</h1>
    <p class="lead">Please choose a subcategory to proceed with.</p>

    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-3 justify-content-center">
        <!-- Button to go to EKG Report page -->
        <div class="col">
            <a href="/ekg-report/" class="btn btn-primary-custom btn-custom w-100">EKG Delay Report</a>
        </div>

        <!-- Button to go to EKG Breakdown page -->
        <div class="col">
            <a href="/ekg-breakdown/" class="btn btn-secondary-custom btn-custom w-100">EKG Breakdown</a>
        </div>

        <!-- Button to go to STM Dashboard page -->
        <div class="col">
            <a href="/stm-dashboard/" class="btn btn-primary-custom btn-custom w-100">STM Dashboard</a>
        </div>
        
        <!-- Button for Search Page -->
        <div class="col">
            <a href="/search/" class="btn btn-primary-custom btn-custom w-100">EKSTM Timetable</a>
        </div>

        <!-- Button for Upload Page -->
        <div class="col">
            <a href="/upload/" class="btn btn-primary-custom btn-custom w-100">CC Allocations</a>
        </div>
    </div>

    <!-- Back to Home Button -->
    <div class="mt-4">
        <a href="/" class="btn btn-home btn-custom">Return to Home</a>
    </div>
</div>

<div class="footer">
    <p>&copy; 2024 Emirates General Transport. <a href="#">Privacy Policy</a></p>
</div>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
