<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Subcategory</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* Custom Styles */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .fade-in {
            animation: fadeIn 1s ease-in-out;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="bg-gradient-to-r from-blue-50 via-blue-100 to-blue-200">

<!-- Logout link -->
<a href="/logout/" class="absolute top-5 right-5 text-lg font-medium text-red-600 hover:text-red-700 transition duration-300">Logout</a>

<div class="container max-w-4xl mx-auto bg-white p-10 rounded-xl shadow-xl mt-20 fade-in">

    <h1 class="text-4xl font-extrabold text-center text-blue-900 mb-8">Select Subcategory</h1>
    <p class="text-lg text-center text-gray-600 mb-8">Please choose a subcategory to proceed with.</p>

    <!-- Button Grid -->
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
        <!-- Button to go to EKG Report page -->
        <div>
            <a href="/ekg-report/" class="block bg-gradient-to-r from-indigo-500 via-indigo-600 to-indigo-700 text-white py-4 px-6 rounded-xl text-center font-semibold shadow-lg hover:scale-105 transform transition duration-300 ease-in-out">EKG Delay Report</a>
        </div>

        <!-- Button to go to EKG Breakdown page -->
        <div>
            <a href="/ekg-breakdown/" class="block bg-gradient-to-r from-green-500 via-green-600 to-green-700 text-white py-4 px-6 rounded-xl text-center font-semibold shadow-lg hover:scale-105 transform transition duration-300 ease-in-out">EKG Breakdown</a>
        </div>

        <!-- Button to go to STM Dashboard page -->
        <div>
            <a href="/stm-dashboard/" class="block bg-gradient-to-r from-blue-600 via-blue-700 to-blue-800 text-white py-4 px-6 rounded-xl text-center font-semibold shadow-lg hover:scale-105 transform transition duration-300 ease-in-out">STM Dashboard</a>
        </div>

        <!-- Button for Search Page -->
        <div>
            <a href="/search/" class="block bg-gradient-to-r from-purple-500 via-purple-600 to-purple-700 text-white py-4 px-6 rounded-xl text-center font-semibold shadow-lg hover:scale-105 transform transition duration-300 ease-in-out">EKSTM Timetable</a>
        </div>

        <!-- Button for Upload Page -->
        <div>
            <a href="/upload/" class="block bg-gradient-to-r from-teal-500 via-teal-600 to-teal-700 text-white py-4 px-6 rounded-xl text-center font-semibold shadow-lg hover:scale-105 transform transition duration-300 ease-in-out">CC Allocations</a>
        </div>
    </div>

    <!-- Back to Home Button -->
    <div class="mt-8 text-center">
        <a href="/" class="bg-green-600 text-white py-3 px-8 rounded-xl font-semibold shadow-lg hover:bg-green-700 transform transition duration-300 ease-in-out">Return to Home</a>
    </div>
</div>

<!-- Footer -->
<div class="text-center text-gray-600 mt-12 pb-6">
    <p>&copy; 2024 Emirates General Transport. <a href="#" class="text-blue-600 hover:underline">Privacy Policy</a></p>
</div>

</body>
</html>
