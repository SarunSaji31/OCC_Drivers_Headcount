{% extends "duty/base_generic.html" %}

{% block title %}Error · OCC-EKG{% endblock %}

{% block content %}
<div style="max-width: 700px; margin: 0 auto;">
    <div class="content-surface">
        <div class="alert alert-danger" role="alert">
            <h4 class="alert-heading"><i class="bi bi-exclamation-octagon me-2"></i>Error</h4>
            <p class="mb-2">{{ error }}</p>
            <hr>
            <p class="mb-0">Please go back and try again with valid inputs, or contact support if the issue persists.</p>
        </div>
        <div class="text-center">
            <a href="{% url 'home' %}" class="btn btn-primary mt-2"><i class="bi bi-house-door me-1"></i>Back to Home</a>
        </div>
    </div>
</div>
{% endblock %}
