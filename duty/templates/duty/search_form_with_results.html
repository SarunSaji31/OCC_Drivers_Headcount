<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emirates Airline Staff Transport - Search Route</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f0eb; /* Light beige */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        h1 {
            font-weight: 700;
            color: #d71920; /* Emirates red */
            text-align: center;
            margin-bottom: 30px;
        }
        .card {
            border: 2px solid #d71920; /* Emirates red */
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0px 6px 12px rgba(0, 0, 0, 0.1);
            background-color: #ffffff;
        }
        .form-label {
            font-weight: 600;
            color: #333;
        }
        .form-control, .form-select {
            border-radius: 8px;
            border: 1px solid #d71920;
        }
        .form-control:focus, .form-select:focus {
            box-shadow: 0px 0px 8px rgba(215, 25, 32, 0.4);
            border-color: #d71920;
        }
        .btn-primary {
            background-color: #d71920;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            transition: background-color 0.3s ease;
        }
        .btn-primary:hover {
            background-color: #b5161c;
        }
        .table {
            margin-top: 20px;
            background-color: #ffffff;
            border-radius: 12px;
            overflow: hidden;
        }
        .table th {
            background-color: #d71920;
            color: #ffffff;
            font-weight: 700;
        }
        .table th, .table td {
            vertical-align: middle;
            text-align: center;
        }
        .text-muted {
            font-size: 0.9rem;
            color: #6c757d;
        }
        .container {
            max-width: 1200px;
            margin-top: 40px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Emirates Airline Staff Transport - Search Route</h1>
    <div class="row">
        <!-- Search Area -->
        <div class="col-md-6">
            <div class="card">
                <form id="search-form">
                    <div class="mb-3">
                        <label for="route_name" class="form-label">Route Name</label>
                        <input type="text" id="route_name" name="route_name" class="form-control" placeholder="Enter Route Name">
                    </div>
                    <div class="mb-3">
                        <label for="type" class="form-label">Route Type</label>
                        <select id="type" name="type" class="form-select">
                            <option value="">Select Type</option>
                            <option value="Inbound">Inbound</option>
                            <option value="Outbound">Outbound</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="work_hub" class="form-label">Work Hub</label>
                        <input type="text" id="work_hub" name="work_hub" class="form-control" placeholder="Enter Work Hub">
                    </div>
                    <div class="mb-3">
                        <label for="pick_up_point" class="form-label">Pick Up Point</label>
                        <input type="text" id="pick_up_point" name="pick_up_point" class="form-control" placeholder="Enter Pick Up Point">
                    </div>
                    <div class="mb-3">
                        <label for="stop_id" class="form-label">Stop ID</label>
                        <input type="text" id="stop_id" name="stop_id" class="form-control" placeholder="Enter Stop ID">
                    </div>
                    <div class="mb-3">
                        <label for="shift_time" class="form-label">Shift Time</label>
                        <input type="time" id="shift_time" name="shift_time" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label for="connection_from" class="form-label">Connection From</label>
                        <input type="text" id="connection_from" name="connection_from" class="form-control" placeholder="Enter Connection From">
                    </div>
                    <div class="mb-3">
                        <label for="connection_to" class="form-label">Connection To</label>
                        <input type="text" id="connection_to" name="connection_to" class="form-control" placeholder="Enter Connection To">
                    </div>
                </form>
            </div>
        </div>

        <!-- Results Area -->
        <div class="col-md-6">
            <div class="card" id="search-results">
                <p class="text-muted">Search results will appear here...</p>
            </div>
        </div>
    </div>
</div>

<!-- JavaScript to handle AJAX search requests and dynamically update results -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    const routeNameInput = document.getElementById('route_name');
    const typeInput = document.getElementById('type');
    const workHubInput = document.getElementById('work_hub');
    const pickUpPointInput = document.getElementById('pick_up_point');
    const stopIdInput = document.getElementById('stop_id');
    const shiftTimeInput = document.getElementById('shift_time');
    const connectionFromInput = document.getElementById('connection_from');
    const connectionToInput = document.getElementById('connection_to');
    const resultContainer = document.getElementById('search-results');

    function updateResults(data) {
        let html = '<h2 class="mt-4">Search Results</h2>';
        if (data.routes && data.routes.length > 0) {
            html += `<table class="table table-striped table-bordered">
                        <thead>
                            <tr>
                                <th>No</th>
                                <th>Route Name</th>
                                <th>Route Type</th>
                                <th>Shift Time</th>
                                <th>Work Hub</th>
                            </tr>
                        </thead>
                        <tbody>`;
            data.routes.forEach((route, index) => {
                html += `<tr>
                            <td>${index + 1}</td>
                            <td><a href="/route-details/?route=${route.route_name}&shift_time=${route.shift_time}" target="_blank">${route.route_name || '-'}</a></td>
                            <td>${route.route_type || '-'}</td>
                            <td>${route.shift_time || '-'}</td>
                            <td>${route.work_hub || '-'}</td>
                        </tr>`;
            });
            html += `</tbody></table>`;
        } else {
            html += `<p class="text-danger">No routes found for your search criteria.</p>`;
        }
        resultContainer.innerHTML = html;
    }

    function fetchResults() {
        const params = new URLSearchParams({
            route_name: routeNameInput.value.trim(),
            type: typeInput.value.trim(),
            work_hub: workHubInput.value.trim(),
            pick_up_point: pickUpPointInput.value.trim(),
            stop_id: stopIdInput.value.trim(),
            shift_time: shiftTimeInput.value,
            connection_from: connectionFromInput.value.trim(),
            connection_to: connectionToInput.value.trim()
        });

        fetch(`/search/?${params.toString()}`, {
            method: 'GET',
            headers: {
                'X-Requested-With': 'XMLHttpRequest'
            }
        })
        .then(response => {
            if (!response.ok) {
                throw new Error('Network response was not ok');
            }
            return response.json();
        })
        .then(data => updateResults(data))
        .catch(error => {
            console.error('Error:', error);
            resultContainer.innerHTML = `<p class="text-danger">An error occurred while fetching results. Please try again later.</p>`;
        });
    }

    [routeNameInput, typeInput, workHubInput, pickUpPointInput, stopIdInput, shiftTimeInput, connectionFromInput, connectionToInput].forEach(input => {
        input.addEventListener('input', fetchResults);
    });
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
