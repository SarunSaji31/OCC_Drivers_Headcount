<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Route</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" href="data:," /> <!-- Prevents 404 error for favicon -->
</head>
<body>
<div class="container mt-5">
    <h1>Search Route</h1>
    <div class="row">
        <!-- Search Area -->
        <div class="col-md-6">
            <form id="search-form">
                <!-- Route Type Field -->
                <div class="mb-3">
                    <label for="type" class="form-label">Route Type</label>
                    <select id="type" name="type" class="form-select">
                        <option value="">Select Type</option>
                        <option value="Inbound">Inbound</option>
                        <option value="Outbound">Outbound</option>
                    </select>
                </div>
                <!-- Work Hub Field -->
                <div class="mb-3">
                    <label for="work_hub" class="form-label">Work Hub</label>
                    <input type="text" id="work_hub" name="work_hub" class="form-control" placeholder="Enter Work Hub">
                </div>
                <!-- Pick Up Point Field -->
                <div class="mb-3">
                    <label for="pick_up_point" class="form-label">Pick Up Point</label>
                    <input type="text" id="pick_up_point" name="pick_up_point" class="form-control" placeholder="Enter Pick Up Point">
                </div>
                <!-- Stop ID Field -->
                <div class="mb-3">
                    <label for="stop_id" class="form-label">Stop ID</label>
                    <input type="text" id="stop_id" name="stop_id" class="form-control" placeholder="Enter Stop ID">
                </div>
                <!-- Shift Time Field -->
                <div class="mb-3">
                    <label for="shift_time" class="form-label">Shift Time</label>
                    <input type="time" id="shift_time" name="shift_time" class="form-control">
                </div>
            </form>
        </div>

        <!-- Results Area -->
        <div class="col-md-6" id="search-results">
            <!-- Results will be dynamically injected here -->
        </div>
    </div>
</div>

<!-- JavaScript to handle AJAX search requests and dynamically update results -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    const typeInput = document.getElementById('type');
    const workHubInput = document.getElementById('work_hub');
    const pickUpPointInput = document.getElementById('pick_up_point');
    const stopIdInput = document.getElementById('stop_id');
    const shiftTimeInput = document.getElementById('shift_time');
    const resultContainer = document.getElementById('search-results');

    if (!typeInput || !workHubInput || !pickUpPointInput || !stopIdInput || !shiftTimeInput || !resultContainer) {
        console.error("Some input elements are missing. Check HTML structure.");
        return;
    }

    // Function to update the search results area based on fetched data
    function updateResults(data) {
        let html = '<h2 class="mt-5">Search Results</h2>';
        if (data.routes && data.routes.length > 0) {
            html += `<table class="table table-striped">
                        <thead>
                            <tr>
                                <th>No</th>
                                <th>Route</th>
                                <th>Route Type</th>
                                <th>Shift Time</th>
                                <th>Work Hub</th>
                            </tr>
                        </thead>
                        <tbody>`;
            data.routes.forEach((route, index) => {
                html += `<tr>
                            <td>${index + 1}</td>
                            <td>${route.route_code || '-'}</td>
                            <td>${route.route_type || '-'}</td>
                            <td>${route.shift_time || '-'}</td>
                            <td>${route.work_hub || '-'}</td>
                        </tr>`;
            });
            html += `</tbody></table>`;
        } else {
            html += `<p>No routes found for your search criteria.</p>`;
        }
        resultContainer.innerHTML = html;
    }

    // Function to send AJAX request to fetch results
    function fetchResults() {
        const params = new URLSearchParams({
            type: typeInput.value.trim(),
            work_hub: workHubInput.value.trim(),
            pick_up_point: pickUpPointInput.value.trim(),
            stop_id: stopIdInput.value.trim(),
            shift_time: shiftTimeInput.value,
        });

        fetch(`/search/?${params.toString()}`, {
            method: 'GET',
            headers: {
                'X-Requested-With': 'XMLHttpRequest'
            }
        })
        .then(response => {
            if (!response.ok) {
                throw new Error('Network response was not ok');
            }
            // Attempt to parse JSON, handle if response isn't JSON
            return response.json().catch(() => {
                throw new Error("Response is not valid JSON");
            });
        })
        .then(data => updateResults(data))
        .catch(error => {
            console.error('Error:', error);
            resultContainer.innerHTML = `<p class="text-danger">An error occurred while fetching results. Please try again later.</p>`;
        });
    }

    // Add event listeners to input fields to trigger the fetch function
    [typeInput, workHubInput, pickUpPointInput, stopIdInput, shiftTimeInput].forEach(input => {
        input.addEventListener('input', fetchResults);
    });
});
</script>
    
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
