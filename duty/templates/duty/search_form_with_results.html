<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emirates Airline Staff Transport - Search Routes</title>
    <!-- Tailwind CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        /* Custom styles for Emirates branding */
        .emirates-red {
            background-color: #d71920;
        }
        .emirates-red-hover:hover {
            background-color: #b5161c;
        }
        .shadow-custom {
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        .table-header {
            background-color: #d71920;
            color: white;
        }
        /* Smooth transitions */
        .transition-all {
            transition: all 0.3s ease-in-out;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans antialiased">
    <!-- Header -->
    <header class="bg-white shadow-custom py-6">
        <div class="container mx-auto px-4 lg:px-8">
            <h1 class="text-3xl md:text-4xl font-bold text-center text-gray-800">
                Emirates Airline Staff Transport
                <span class="block text-lg md:text-xl font-medium text-gray-600 mt-2">Route Search</span>
            </h1>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-4 lg:px-8 py-8">
        <div class="flex flex-col lg:flex-row lg:space-x-6">
            <!-- Search Form -->
            <div class="w-full lg:w-1/2 mb-6 lg:mb-0">
                <div class="bg-white rounded-xl shadow-custom p-6">
                    <h2 class="text-xl font-semibold text-gray-800 mb-4">Search Routes</h2>
                    <form id="search-form" class="space-y-4">
                        <div>
                            <label for="route_name" class="block text-sm font-medium text-gray-700">Route Name</label>
                            <input type="text" id="route_name" name="route_name" class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-red-500 transition-all" placeholder="Enter Route Name">
                        </div>
                        <div>
                            <label for="type" class="block text-sm font-medium text-gray-700">Route Type</label>
                            <select id="type" name="type" class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-red-500 transition-all">
                                <option value="">Select Type</option>
                                <option value="Inbound">Inbound</option>
                                <option value="Outbound">Outbound</option>
                            </select>
                        </div>
                        <div>
                            <label for="work_hub" class="block text-sm font-medium text-gray-700">Work Hub</label>
                            <input type="text" id="work_hub" name="work_hub" class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-red-500 transition-all" placeholder="Enter Work Hub">
                        </div>
                        <div>
                            <label for="pick_up_point" class="block text-sm font-medium text-gray-700">Pick Up Point</label>
                            <input type="text" id="pick_up_point" name="pick_up_point" class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-red-500 transition-all" placeholder="Enter Pick Up Point">
                        </div>
                        <div>
                            <label for="stop_id" class="block text-sm font-medium text-gray-700">Stop ID</label>
                            <input type="text" id="stop_id" name="stop_id" class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-red-500 transition-all" placeholder="Enter Stop ID">
                        </div>
                        <div>
                            <label for="shift_time" class="block text-sm font-medium text-gray-700">Shift Time</label>
                            <input type="time" id="shift_time" name="shift_time" class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-red-500 transition-all">
                        </div>
                        <div>
                            <label for="connection_from" class="block text-sm font-medium text-gray-700">Connection From</label>
                            <input type="text" id="connection_from" name="connection_from" class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-red-500 transition-all" placeholder="Enter Connection From">
                        </div>
                        <div>
                            <label for="connection_to" class="block text-sm font-medium text-gray-700">Connection To</label>
                            <input type="text" id="connection_to" name="connection_to" class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-red-500 transition-all" placeholder="Enter Connection To">
                        </div>
                    </form>
                </div>
            </div>

            <!-- Search Results -->
            <div class="w-full lg:w-1/2">
                <div class="bg-white rounded-xl shadow-custom p-6">
                    <h2 class="text-xl font-semibold text-gray-800 mb-4">Search Results</h2>
                    <div id="search-results" class="text-gray-500 italic">
                        Search results will appear here...
                    </div>
                </div>
            </div>
        </div>

        <!-- Back Button -->
        <div class="mt-6">
            <a href="/subcategory/" class="inline-block px-6 py-3 bg-emirates-red text-white font-semibold rounded-lg emirates-red-hover transition-all">Back to Subcategory</a>
        </div>
    </main>

    <!-- Footer (Optional) -->
    <footer class="bg-gray-800 text-white py-4 mt-8">
        <div class="container mx-auto px-4 text-center">
            <p>&copy; 2025 Emirates Airline Staff Transport. All rights reserved.</p>
        </div>
    </footer>

    <!-- JavaScript for AJAX Search -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const inputs = {
                routeName: document.getElementById('route_name'),
                type: document.getElementById('type'),
                workHub: document.getElementById('work_hub'),
                pickUpPoint: document.getElementById('pick_up_point'),
                stopId: document.getElementById('stop_id'),
                shiftTime: document.getElementById('shift_time'),
                connectionFrom: document.getElementById('connection_from'),
                connectionTo: document.getElementById('connection_to')
            };
            const resultContainer = document.getElementById('search-results');

            function updateResults(data) {
                let html = '';
                if (data.routes && data.routes.length > 0) {
                    html += `<div class="overflow-x-auto"><table class="w-full text-left border-collapse">
                                <thead class="table-header">
                                    <tr>
                                        <th class="p-3 text-sm font-semibold">No</th>
                                        <th class="p-3 text-sm font-semibold">Route Name</th>
                                        <th class="p-3 text-sm font-semibold">Route Type</th>
                                        <th class="p-3 text-sm font-semibold">Shift Time</th>
                                        <th class="p-3 text-sm font-semibold">Work Hub</th>
                                    </tr>
                                </thead>
                                <tbody>`;
                    data.routes.forEach((route, index) => {
                        html += `<tr class="border-b hover:bg-gray-50 transition-all">
                                    <td class="p-3 text-sm">${index + 1}</td>
                                    <td class="p-3 text-sm"><a href="/route-details/?route=${route.route_name}&shift_time=${route.shift_time}&type=${route.route_type}" target="_blank" class="text-red-600 hover:underline">${route.route_name || '-'}</a></td>
                                    <td class="p-3 text-sm">${route.route_type || '-'}</td>
                                    <td class="p-3 text-sm">${route.shift_time || '-'}</td>
                                    <td class="p-3 text-sm">${route.work_hub || '-'}</td>
                                </tr>`;
                    });
                    html += `</tbody></table></div>`;
                } else {
                    html = `<p class="text-red-600">No routes found for your search criteria.</p>`;
                }
                resultContainer.innerHTML = html;
                resultContainer.classList.remove('italic', 'text-gray-500');
            }

            function fetchResults() {
                const params = new URLSearchParams({
                    route_name: inputs.routeName.value.trim(),
                    type: inputs.type.value.trim(),
                    work_hub: inputs.workHub.value.trim(),
                    pick_up_point: inputs.pickUpPoint.value.trim(),
                    stop_id: inputs.stopId.value.trim(),
                    shift_time: inputs.shiftTime.value,
                    connection_from: inputs.connectionFrom.value.trim(),
                    connection_to: inputs.connectionTo.value.trim()
                });

                fetch(`/search/?${params.toString()}`, {
                    method: 'GET',
                    headers: { 'X-Requested-With': 'XMLHttpRequest' }
                })
                .then(response => response.ok ? response.json() : Promise.reject('Network error'))
                .then(data => updateResults(data))
                .catch(error => {
                    console.error('Error:', error);
                    resultContainer.innerHTML = `<p class="text-red-600">An error occurred. Please try again later.</p>`;
                    resultContainer.classList.remove('italic', 'text-gray-500');
                });
            }

            Object.values(inputs).forEach(input => input.addEventListener('input', fetchResults));
        });
    </script>
</body>
</html>
