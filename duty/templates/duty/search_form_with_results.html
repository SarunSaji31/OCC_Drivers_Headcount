<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Route</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h1>Search Route</h1>
    
    <!-- Search Form (without submit button) -->
    <form id="search-form" method="GET" action="#">
        <div class="mb-3">
            <label for="route" class="form-label">Route Code</label>
            <input type="text" id="route" name="route" class="form-control" placeholder="Enter Route Code">
        </div>

        <div class="mb-3">
            <label for="type" class="form-label">Type</label>
            <select id="type" name="type" class="form-select">
                <option value="">Select Type</option>
                <option value="Inbound">Inbound</option>
                <option value="Outbound">Outbound</option>
            </select>
        </div>

        <div class="mb-3">
            <label for="shift_time" class="form-label">Shift Time</label>
            <input type="time" id="shift_time" name="shift_time" class="form-control">
        </div>
    </form>

    <!-- Search Results Container -->
    <div id="search-results" class="mt-5">
        <!-- Results will be dynamically injected here -->
    </div>
</div>

<!-- JavaScript to handle AJAX search requests and dynamically update results -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    const routeInput = document.getElementById('route');
    const typeInput = document.getElementById('type');
    const shiftTimeInput = document.getElementById('shift_time');
    const resultContainer = document.getElementById('search-results');

    // Function to update the search results area
    function updateResults(data) {
        let html = '';
        if (data.routes.length > 0) {
            html += `<h2 class="mt-5">Search Results</h2>
                     <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>Route Code</th>
                                <th>Shift Time</th>`;
            if (data.display_type) {
                html += `<th>Type</th>`;
            }
            html += `</tr></thead><tbody>`;

            data.routes.forEach(route => {
                html += `<tr>
                            <td>${route.route_code}</td>
                            <td>${route.shift_times.join('<br>')}</td>`;
                if (data.display_type) {
                    html += `<td>${route.route_type}</td>`;
                }
                html += `</tr>`;
            });
            html += `</tbody></table>`;
        } else {
            html += `<p>No routes found for your search criteria.</p>`;
        }
        resultContainer.innerHTML = html;
    }

    // Function to send AJAX request
    function fetchResults() {
        const route = routeInput.value.trim();
        const type = typeInput.value.trim();
        const shift_time = shiftTimeInput.value;

        // Check if any fields are filled before making the request
        if (!route && !type && !shift_time) {
            resultContainer.innerHTML = '';  // Clear results if all fields are empty
            return;
        }

        const params = new URLSearchParams({
            route: route,
            type: type,
            shift_time: shift_time
        });

        fetch(`/ajax/search_route/?${params.toString()}`, {
            method: 'GET',
            headers: {
                'X-Requested-With': 'XMLHttpRequest'
            }
        })
        .then(response => response.json())
        .then(data => {
            updateResults(data);
        })
        .catch(error => {
            console.error('Error:', error);
            resultContainer.innerHTML = `<p class="text-danger">An error occurred while fetching results.</p>`;
        });
    }

    // Add event listeners to input fields
    routeInput.addEventListener('input', fetchResults);
    typeInput.addEventListener('input', fetchResults);
    shiftTimeInput.addEventListener('input', fetchResults);
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
